<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LEAD RADAR // RAOUF px</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  :root {
    --bg: #020a04;
    --green: #00ff46;
    --green-dim: rgba(0,255,70,0.35);
    --green-glow: rgba(0,255,70,0.15);
    --amber: #f0b44c;
    --blue: #4cf0d0;
    --purple: #c84bff;
    --text: rgba(0,255,70,0.82);
    --muted: rgba(0,255,70,0.4);
    --panel-bg: rgba(0,10,2,0.97);
    --border: rgba(0,255,70,0.22);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100%;
    overflow: hidden;
  }

  /* CRT scanlines */
  body::before {
    content:''; position:fixed; inset:0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    pointer-events:none; z-index:9999;
  }

  /* TOP BAR */
  .topbar {
    position:fixed; top:0; left:0; right:0; height:44px;
    display:flex; align-items:center; gap:12px;
    padding:0 14px;
    border-bottom:1px solid var(--border);
    background:rgba(0,8,2,0.98);
    z-index:50;
  }
  .topbar-logo {
    font-family:'VT323',monospace; font-size:20px;
    letter-spacing:2px; color:var(--green);
    text-shadow:0 0 8px var(--green);
  }
  .topbar-sep { flex:1; }
  .topbar-stats { display:flex; gap:10px; }
  .topbar-stat { font-size:10px; color:var(--muted); letter-spacing:1px; }
  .topbar-stat span { color:var(--green); }
  .status-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--green); box-shadow:0 0 5px var(--green);
    animation:pulse 1.4s infinite; display:inline-block; margin-right:5px;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* MAIN SCROLL AREA */
  .main {
    position:fixed; top:44px; bottom:0; left:0; right:0;
    overflow-y:auto; -webkit-overflow-scrolling:touch;
  }

  /* DESKTOP: side by side */
  @media (min-width:700px) {
    .main { display:grid; grid-template-columns:1fr 320px; overflow:hidden; }
    .radar-section {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:20px; border-right:1px solid var(--border); overflow:hidden;
    }
    .list-section { display:flex; flex-direction:column; overflow:hidden; }
    .leads-list { flex:1; overflow-y:auto; }
  }

  /* MOBILE: stacked */
  @media (max-width:699px) {
    .main { display:flex; flex-direction:column; }
    .radar-section {
      display:flex; flex-direction:column; align-items:center;
      padding:14px 14px 6px; flex-shrink:0;
    }
    .list-section { display:flex; flex-direction:column; }
    .leads-list { overflow-y:visible; }
  }

  /* RADAR CANVAS - responsive square */
  .radar-wrap {
    position:relative; width:100%; max-width:400px;
  }
  .radar-wrap::before { content:''; display:block; padding-top:100%; }
  canvas#radarCanvas {
    position:absolute; inset:0; width:100%; height:100%;
    image-rendering:pixelated;
  }

  /* Signal notification */
  .signal-notify {
    margin-top:8px; width:100%; max-width:400px;
    background:rgba(0,255,70,0.08); border:1px solid var(--green-dim);
    padding:5px 14px; font-size:10px; color:var(--green);
    letter-spacing:1.5px; opacity:0; transition:opacity 0.3s; text-align:center;
  }
  .signal-notify.show { opacity:1; }
  .signal-notify .src { color:var(--amber); }

  /* Legend */
  .radar-labels { display:flex; gap:14px; margin-top:8px; font-size:9px; letter-spacing:1px; }
  .rl { display:flex; align-items:center; gap:5px; color:var(--muted); }
  .rl-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

  /* LIST SECTION */
  .list-header {
    padding:10px 14px 8px; border-bottom:1px solid var(--border);
    font-family:'VT323',monospace; font-size:16px; letter-spacing:2px;
    color:var(--green); display:flex; align-items:center; gap:7px; flex-shrink:0;
  }
  .filters {
    padding:8px 14px; display:flex; gap:5px; flex-wrap:wrap;
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .filter-btn {
    font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px;
    padding:5px 9px; background:transparent; border:1px solid var(--border);
    color:var(--muted); cursor:pointer; transition:all 0.15s; border-radius:2px;
  }
  .filter-btn.active, .filter-btn:hover {
    border-color:var(--green); color:var(--green); background:var(--green-glow);
  }

  .leads-list {
    scrollbar-width:thin; scrollbar-color:var(--border) transparent;
  }
  .leads-list::-webkit-scrollbar { width:3px; }
  .leads-list::-webkit-scrollbar-thumb { background:var(--border); }

  .lead-card {
    padding:11px 14px; border-bottom:1px solid rgba(0,255,70,0.07);
    cursor:pointer; transition:background 0.15s; position:relative; min-height:54px;
  }
  .lead-card:active { background:rgba(0,255,70,0.07); }
  .lead-card.selected { background:rgba(0,255,70,0.09); border-left:2px solid var(--green); }

  .lc-top { display:flex; align-items:center; gap:7px; margin-bottom:3px; }
  .lc-platform { font-size:8px; letter-spacing:1px; padding:1px 5px; border:1px solid currentColor; border-radius:2px; flex-shrink:0; }
  .lc-platform.reddit    { color:var(--amber); }
  .lc-platform.upwork    { color:var(--blue); }
  .lc-platform.instagram { color:var(--purple); }
  .lc-user  { font-size:11px; color:var(--green); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lc-time  { font-size:9px; color:var(--muted); flex-shrink:0; }
  .lc-title { font-size:10px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-right:64px; }

  .status-badge {
    position:absolute; right:14px; top:50%; transform:translateY(-50%);
    font-size:8px; letter-spacing:1px; padding:2px 5px; border-radius:2px;
  }
  .status-badge.new       { background:rgba(0,255,70,0.15);   color:var(--green); }
  .status-badge.contacted { background:rgba(240,180,76,0.15); color:var(--amber); }
  .status-badge.replied   { background:rgba(76,240,208,0.15); color:var(--blue); }
  .status-badge.code_sent { background:rgba(200,75,255,0.15); color:var(--purple); }
  .status-badge.booked    { background:rgba(0,255,70,0.25);   color:var(--green); }

  .empty-state {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:120px; color:var(--muted); font-size:11px; letter-spacing:1px; gap:8px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .blink { animation:blink 1s infinite; }

  /* DETAIL PANEL - desktop: slides from right */
  @media (min-width:700px) {
    .detail-panel {
      position:fixed; right:0; top:44px;
      width:320px; height:calc(100vh - 44px);
      background:var(--panel-bg); border-left:1px solid var(--green-dim);
      transform:translateX(100%); transition:transform 0.25s ease;
      z-index:200; overflow-y:auto; padding:18px;
    }
    .detail-panel.open { transform:translateX(0); }
  }

  /* DETAIL PANEL - mobile: slides up from bottom */
  @media (max-width:699px) {
    .detail-panel {
      position:fixed; left:0; right:0; bottom:0;
      height:78vh;
      background:var(--panel-bg); border-top:1px solid var(--green-dim);
      border-radius:16px 16px 0 0;
      transform:translateY(100%); transition:transform 0.28s ease;
      z-index:200; overflow-y:auto; padding:0 18px 36px;
      -webkit-overflow-scrolling:touch;
    }
    .detail-panel.open { transform:translateY(0); }
    .detail-panel::before {
      content:''; display:block;
      width:36px; height:4px; background:var(--border);
      border-radius:2px; margin:10px auto 14px;
    }
  }

  /* Backdrop */
  .detail-backdrop {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.55); z-index:199;
  }
  .detail-backdrop.show { display:block; }

  .dp-close {
    position:absolute; top:14px; right:16px;
    background:none; border:none; color:var(--muted);
    font-family:'Share Tech Mono',monospace; font-size:13px;
    cursor:pointer; letter-spacing:1px; padding:4px 8px;
  }
  .dp-close:hover { color:var(--green); }

  .dp-platform { font-size:9px; letter-spacing:2px; margin-bottom:5px; margin-top:4px; }
  .dp-user {
    font-family:'VT323',monospace; font-size:26px; color:var(--green);
    text-shadow:0 0 8px var(--green-dim); margin-bottom:3px;
    word-break:break-all; padding-right:60px;
  }
  .dp-loc { font-size:10px; color:var(--muted); margin-bottom:12px; }
  .dp-divider { border:none; border-top:1px solid var(--border); margin:12px 0; }
  .dp-label { font-size:9px; letter-spacing:2px; color:var(--muted); margin-bottom:3px; }
  .dp-value { font-size:11px; color:var(--text); margin-bottom:12px; line-height:1.5; word-break:break-word; }
  .dp-link  { color:var(--blue); text-decoration:none; font-size:10px; word-break:break-all; }
  .dp-link:hover { text-decoration:underline; }

  .dp-status-row { display:flex; flex-wrap:wrap; gap:5px; }
  .dp-status-btn {
    font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px;
    padding:6px 9px; background:transparent; border:1px solid var(--border);
    color:var(--muted); cursor:pointer; transition:all 0.15s; border-radius:2px;
  }
  .dp-status-btn:hover  { border-color:var(--amber); color:var(--amber); }
  .dp-status-btn.active { border-color:var(--green); color:var(--green); background:var(--green-glow); }

  .dp-notes {
    width:100%; background:rgba(0,255,70,0.04); border:1px solid var(--border);
    color:var(--text); font-family:'Share Tech Mono',monospace; font-size:11px;
    padding:8px; resize:vertical; min-height:60px; margin-top:4px; outline:none; border-radius:2px;
  }
  .dp-notes:focus { border-color:var(--green-dim); }

  .dp-actions { display:flex; flex-direction:column; gap:7px; margin-top:4px; }
  .dp-btn {
    font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:1px;
    padding:11px 12px; background:transparent; border:1px solid var(--border);
    color:var(--text); cursor:pointer; transition:all 0.15s;
    text-align:left; border-radius:2px; width:100%;
  }
  .dp-btn:hover   { border-color:var(--green); color:var(--green); background:var(--green-glow); }
  .dp-btn.primary { border-color:var(--green-dim); color:var(--green); }

  /* Loading bar */
  .loading-bar {
    position:fixed; top:44px; left:0; right:0; height:2px;
    background:var(--green); transform-origin:left; transform:scaleX(0);
    transition:transform 0.4s ease; z-index:300; box-shadow:0 0 6px var(--green);
  }
  .loading-bar.active { transform:scaleX(0.7); }
  .loading-bar.done   { transform:scaleX(1); transition:transform 0.1s; }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<header class="topbar">
  <span class="topbar-logo">&#9658; LEAD RADAR</span>
  <div class="topbar-sep"></div>
  <div class="topbar-stats">
    <span class="topbar-stat"><span class="status-dot"></span>LIVE</span>
    <span class="topbar-stat">ALL: <span id="totalCount">0</span></span>
    <span class="topbar-stat">NEW: <span id="newCount">0</span></span>
  </div>
</header>

<div class="main">

  <section class="radar-section">
    <div class="radar-wrap">
      <canvas id="radarCanvas" width="480" height="480"></canvas>
    </div>
    <div class="signal-notify" id="signalNotify">
      SIGNAL: <span class="src" id="notifySrc">--</span> &nbsp;|&nbsp; <span id="notifyUser">--</span>
    </div>
    <div class="radar-labels">
      <div class="rl"><div class="rl-dot" style="background:#00ff46;box-shadow:0 0 4px #00ff46"></div>INSTAGRAM</div>
      <div class="rl"><div class="rl-dot" style="background:#f0b44c;box-shadow:0 0 4px #f0b44c"></div>REDDIT</div>
      <div class="rl"><div class="rl-dot" style="background:#4cf0d0;box-shadow:0 0 4px #4cf0d0"></div>UPWORK</div>
    </div>
  </section>

  <section class="list-section">
    <div class="list-header">
      <span class="status-dot"></span> DETECTED SIGNALS
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">ALL</button>
      <button class="filter-btn" data-filter="new">NEW</button>
      <button class="filter-btn" data-filter="reddit">REDDIT</button>
      <button class="filter-btn" data-filter="upwork">UPWORK</button>
      <button class="filter-btn" data-filter="instagram">INSTAGRAM</button>
    </div>
    <div class="leads-list" id="leadsList">
      <div class="empty-state"><span class="blink">&#9646;</span>SCANNING...</div>
    </div>
  </section>

</div>

<div class="detail-backdrop" id="detailBackdrop"></div>

<div class="detail-panel" id="detailPanel">
  <button class="dp-close" id="detailClose">[X]</button>
  <div class="dp-platform" id="dp-platform">--</div>
  <div class="dp-user"     id="dp-user">--</div>
  <div class="dp-loc"      id="dp-loc">--</div>
  <hr class="dp-divider">
  <div class="dp-label">CAPTION / TITLE</div>
  <div class="dp-value" id="dp-caption">--</div>
  <div class="dp-label">LINK</div>
  <div class="dp-value"><a class="dp-link" id="dp-link" href="#" target="_blank">--</a></div>
  <div class="dp-label">DETECTED</div>
  <div class="dp-value" id="dp-time">--</div>
  <hr class="dp-divider">
  <div class="dp-label">STATUS</div>
  <div class="dp-status-row" id="dp-status-row"></div>
  <hr class="dp-divider">
  <div class="dp-label">NOTES</div>
  <textarea class="dp-notes" id="dp-notes" placeholder="add notes..."></textarea>
  <hr class="dp-divider">
  <div class="dp-actions">
    <button class="dp-btn primary" id="dp-open-profile">&#8599; OPEN PROFILE / POST</button>
    <button class="dp-btn"         id="dp-save-notes">&#10003; SAVE NOTES</button>
  </div>
</div>

<script>
const API_BASE  = window.location.origin;
const ADMIN_KEY = (() => {
  let k = sessionStorage.getItem('radar_key');
  if (!k) { k = prompt('ADMIN KEY:'); if (k) sessionStorage.setItem('radar_key', k); }
  return k || '';
})();

const PLATFORM_COLORS = { instagram:'#00ff46', reddit:'#f0b44c', upwork:'#4cf0d0' };
const STATUS_OPTIONS  = ['new','contacted','replied','code_sent','booked'];

let leads=[], filteredLeads=[], currentFilter='all', selectedLead=null, radarSignals=[];

// ── RADAR ──
const canvas = document.getElementById('radarCanvas');
const ctx    = canvas.getContext('2d');
const W=480, H=480, CX=W/2, CY=H/2, R=210;
let sweepAngle=0, lastTime=0;

function polar(a,r){ return {x:CX+Math.cos(a)*r, y:CY+Math.sin(a)*r}; }

function leadToRadarPos(lead){
  let hash=0;
  for(let i=0;i<lead.id.length;i++) hash=(hash*31+lead.id.charCodeAt(i))&0xFFFF;
  const angle=(hash/0xFFFF)*Math.PI*2;
  const dist=40+((hash*7919)%0xFFFF)/0xFFFF*(R-55);
  return polar(angle,dist);
}

function hexToRgba(hex,alpha){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}

function drawRadar(ts){
  const dt=ts-lastTime; lastTime=ts;
  sweepAngle=(sweepAngle+dt*0.0008)%(Math.PI*2);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#020a04'; ctx.fillRect(0,0,W,H);

  ctx.strokeStyle='rgba(0,255,70,0.04)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=16){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=16){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  ctx.save();
  ctx.beginPath(); ctx.arc(CX,CY,R+2,0,Math.PI*2); ctx.clip();

  [0.25,0.5,0.75,1.0].forEach(function(f){
    ctx.beginPath(); ctx.arc(CX,CY,R*f,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,255,70,0.12)'; ctx.lineWidth=1; ctx.stroke();
  });
  ctx.strokeStyle='rgba(0,255,70,0.1)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(CX-R,CY); ctx.lineTo(CX+R,CY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CX,CY-R); ctx.lineTo(CX,CY+R); ctx.stroke();

  for(let i=0;i<60;i++){
    const a0=sweepAngle-(i/60)*1.4, a1=sweepAngle-((i+1)/60)*1.4;
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,a0,a1,true); ctx.closePath();
    ctx.fillStyle='rgba(0,255,70,'+(1-i/60)*0.18+')'; ctx.fill();
  }
  const sp=polar(sweepAngle,R);
  ctx.beginPath(); ctx.moveTo(CX,CY); ctx.lineTo(sp.x,sp.y);
  ctx.strokeStyle='rgba(0,255,70,0.9)'; ctx.lineWidth=1.5;
  ctx.shadowBlur=8; ctx.shadowColor='#00ff46'; ctx.stroke(); ctx.shadowBlur=0;
  ctx.restore();

  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,255,70,0.35)'; ctx.lineWidth=2; ctx.stroke();

  radarSignals.forEach(function(sig){
    const diff=((sweepAngle-sig.angle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
    if(diff<0.15) sig.freshness=1;
    else sig.freshness=Math.max(0,(sig.freshness||0)-0.002);
    const opacity=0.2+sig.freshness*0.8;
    const x=sig.x, y=sig.y, r=sig.lead.status==='new'?5:3.5;
    const grd=ctx.createRadialGradient(x,y,0,x,y,r+5);
    grd.addColorStop(0,hexToRgba(sig.color,opacity*0.4));
    grd.addColorStop(1,hexToRgba(sig.color,0));
    ctx.beginPath(); ctx.arc(x,y,r+5,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=hexToRgba(sig.color,opacity);
    ctx.shadowBlur=sig.lead.status==='new'?10:5; ctx.shadowColor=sig.color;
    ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle=hexToRgba(sig.color,opacity*0.5);
    ctx.fillRect(Math.round(x-r/2),Math.round(y-r/2),Math.round(r),Math.round(r));
  });

  ctx.beginPath(); ctx.arc(CX,CY,4,0,Math.PI*2);
  ctx.fillStyle='rgba(0,255,70,0.8)'; ctx.fill();
  ctx.fillStyle='rgba(0,255,70,0.3)'; ctx.font='10px "Share Tech Mono"';
  ctx.textAlign='center'; ctx.fillText('N',CX,CY-R-8); ctx.fillText('S',CX,CY+R+16);
  ctx.textAlign='left';   ctx.fillText('E',CX+R+6,CY+4);
  ctx.textAlign='right';  ctx.fillText('W',CX-R-6,CY+4);
  requestAnimationFrame(drawRadar);
}

// Touch + click on canvas
function handleCanvasTap(clientX, clientY){
  const rect=canvas.getBoundingClientRect();
  const mx=(clientX-rect.left)*(W/rect.width);
  const my=(clientY-rect.top)*(H/rect.height);
  let best=null, bestDist=24;
  radarSignals.forEach(function(sig){
    const d=Math.hypot(sig.x-mx,sig.y-my);
    if(d<bestDist){bestDist=d;best=sig.lead;}
  });
  if(best) selectLead(best);
}
canvas.addEventListener('click',function(e){ handleCanvasTap(e.clientX,e.clientY); });
canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  if(e.changedTouches.length) handleCanvasTap(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
},{passive:false});

// ── FETCH ──
async function fetchLeads(){
  const bar=document.getElementById('loadingBar');
  bar.className='loading-bar active';
  try{
    const res=await fetch(API_BASE+'/api/leads',{headers:{'x-admin-key':ADMIN_KEY}});
    if(!res.ok) throw new Error('Auth failed');
    const data=await res.json();
    bar.className='loading-bar done';
    setTimeout(function(){bar.className='loading-bar';},400);
    const prevIds=new Set(leads.map(function(l){return l.id;}));
    leads=data.leads||[];
    updateStats(); buildRadarSignals(); applyFilter(currentFilter);
    const newOnes=leads.filter(function(l){return !prevIds.has(l.id);});
    if(newOnes.length && prevIds.size>0) showSignalNotify(newOnes[0].platform,newOnes[0].username);
  }catch(e){ bar.className='loading-bar'; console.error('Fetch error',e); }
}

function updateStats(){
  document.getElementById('totalCount').textContent=leads.length;
  document.getElementById('newCount').textContent=leads.filter(function(l){return l.status==='new';}).length;
}

function buildRadarSignals(){
  radarSignals=leads.map(function(lead){
    const pos=leadToRadarPos(lead);
    const angle=Math.atan2(pos.y-CY,pos.x-CX);
    return {x:pos.x,y:pos.y,angle:(angle+Math.PI*2)%(Math.PI*2),
            color:PLATFORM_COLORS[lead.platform]||'#00ff46',freshness:0,lead:lead};
  });
}

function applyFilter(filter){
  currentFilter=filter;
  document.querySelectorAll('.filter-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.filter===filter);
  });
  filteredLeads=leads.filter(function(l){
    if(filter==='all') return true;
    if(filter==='new') return l.status==='new';
    return l.platform===filter;
  });
  renderLeadsList();
}

function renderLeadsList(){
  const list=document.getElementById('leadsList');
  if(!filteredLeads.length){
    list.innerHTML='<div class="empty-state"><span class="blink">&#9646;</span>NO SIGNALS</div>';
    return;
  }
  list.innerHTML=filteredLeads.map(function(lead){
    return '<div class="lead-card" data-id="'+lead.id+'" onclick="selectLead(leads.find(function(l){return l.id===\''+lead.id+'\'}))">'
      +'<div class="lc-top">'
      +'<span class="lc-platform '+lead.platform+'">'+lead.platform.toUpperCase()+'</span>'
      +'<span class="lc-user">'+escHtml(lead.username)+'</span>'
      +'<span class="lc-time">'+timeAgo(lead.detected_time)+'</span>'
      +'</div>'
      +'<div class="lc-title">'+escHtml(lead.caption_or_title||'--')+'</div>'
      +'<span class="status-badge '+lead.status+'">'+lead.status.replace('_',' ').toUpperCase()+'</span>'
      +'</div>';
  }).join('');
}

function selectLead(lead){
  if(!lead) return;
  selectedLead=lead;
  document.querySelectorAll('.lead-card').forEach(function(c){
    c.classList.toggle('selected',c.dataset.id===lead.id);
  });
  document.getElementById('dp-platform').textContent='◆ '+lead.platform.toUpperCase()+' SIGNAL';
  document.getElementById('dp-platform').style.color=PLATFORM_COLORS[lead.platform]||'var(--green)';
  document.getElementById('dp-user').textContent=lead.username;
  document.getElementById('dp-loc').textContent='📍 '+(lead.location||'Dubai');
  document.getElementById('dp-caption').textContent=lead.caption_or_title||'--';
  const link=document.getElementById('dp-link');
  link.href=lead.profile_or_post_link||'#';
  link.textContent=lead.profile_or_post_link||'--';
  document.getElementById('dp-time').textContent=new Date(lead.detected_time).toLocaleString();
  document.getElementById('dp-notes').value=lead.notes||'';
  document.getElementById('dp-status-row').innerHTML=STATUS_OPTIONS.map(function(s){
    return '<button class="dp-status-btn '+(lead.status===s?'active':'')+'" onclick="updateStatus(\''+lead.id+'\',\''+s+'\')">'+s.replace('_',' ').toUpperCase()+'</button>';
  }).join('');
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('detailBackdrop').classList.add('show');
}

function closeDetail(){
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('detailBackdrop').classList.remove('show');
}

document.getElementById('detailClose').addEventListener('click',closeDetail);
document.getElementById('detailBackdrop').addEventListener('click',closeDetail);
document.getElementById('dp-open-profile').addEventListener('click',function(){
  if(selectedLead&&selectedLead.profile_or_post_link) window.open(selectedLead.profile_or_post_link,'_blank');
});
document.getElementById('dp-save-notes').addEventListener('click',async function(){
  if(!selectedLead) return;
  await patchLead(selectedLead.id,{notes:document.getElementById('dp-notes').value});
});

async function updateStatus(id,status){ await patchLead(id,{status:status}); }
async function patchLead(id,patch){
  try{
    const res=await fetch(API_BASE+'/api/leads/'+id,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','x-admin-key':ADMIN_KEY},
      body:JSON.stringify(patch)
    });
    if(!res.ok) throw new Error();
    const idx=leads.findIndex(function(l){return l.id===id;});
    if(idx>=0) leads[idx]=Object.assign({},leads[idx],patch);
    if(selectedLead&&selectedLead.id===id) selectLead(leads[idx]);
    updateStats(); applyFilter(currentFilter);
  }catch(e){console.error('Patch error',e);}
}

let notifyTimer;
function showSignalNotify(platform,user){
  document.getElementById('notifySrc').textContent=platform.toUpperCase();
  document.getElementById('notifyUser').textContent=user;
  const el=document.getElementById('signalNotify');
  el.classList.add('show');
  clearTimeout(notifyTimer);
  notifyTimer=setTimeout(function(){el.classList.remove('show');},4000);
}

document.querySelectorAll('.filter-btn').forEach(function(btn){
  btn.addEventListener('click',function(){applyFilter(btn.dataset.filter);});
});

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(ts){
  if(!ts) return '--';
  const sec=Math.floor((Date.now()-new Date(ts))/1000);
  if(sec<60)    return sec+'s';
  if(sec<3600)  return Math.floor(sec/60)+'m';
  if(sec<86400) return Math.floor(sec/3600)+'h';
  return Math.floor(sec/86400)+'d';
}

requestAnimationFrame(drawRadar);
fetchLeads();
setInterval(fetchLeads,60000);
