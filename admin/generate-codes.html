<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RAOUF px Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04040c;--surface:#0a0a14;--surface2:#10101e;--surface3:#161624;
  --accent:#f0b44c;--accent2:#ff7e3e;--accent3:#4cf0d0;--accent4:#c84bff;
  --danger:#ff4c4c;--success:#4cf0a0;--warn:#f0d44c;
  --text:rgba(255,255,255,.88);--muted:rgba(255,255,255,.42);--dim:rgba(255,255,255,.18);
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;font-size:13px;overflow:hidden}

body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9000;opacity:.5}

#shell{display:grid;grid-template-rows:auto auto 1fr;height:100vh;position:relative;z-index:1}

#topbar{
  display:flex;align-items:center;gap:10px;
  padding:0 20px;height:52px;
  background:rgba(4,4,12,.97);
  border-bottom:1px solid rgba(240,180,76,.15);
  backdrop-filter:blur(12px);
  flex-shrink:0;
}
.tb-logo{
  font-family:'Press Start 2P',monospace;font-size:10px;
  color:var(--accent);letter-spacing:.06em;margin-right:auto;
  display:flex;align-items:center;gap:10px;
}
.tb-logo::before{
  content:'';display:block;width:8px;height:8px;
  background:var(--accent);
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  animation:diamond-pulse 2s ease-in-out infinite;
}
@keyframes diamond-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.tb-status{font-size:9px;color:var(--accent3);letter-spacing:.06em;opacity:.7}
.tb-btn{
  font-family:'Space Mono',monospace;font-size:10px;
  padding:5px 12px;border:1px solid;border-radius:2px;
  cursor:pointer;background:transparent;transition:all .15s;
  white-space:nowrap;
}
.tb-btn.amber{border-color:rgba(240,180,76,.35);color:var(--accent)}
.tb-btn.amber:hover{background:rgba(240,180,76,.1);border-color:var(--accent)}
.tb-btn.teal{border-color:rgba(76,240,208,.3);color:var(--accent3)}
.tb-btn.teal:hover{background:rgba(76,240,208,.1);border-color:var(--accent3)}
.tb-btn.danger{border-color:rgba(255,76,76,.3);color:var(--danger)}
.tb-btn.danger:hover{background:rgba(255,76,76,.1);border-color:var(--danger)}
.tb-btn.ghost{border-color:var(--border);color:var(--muted)}
.tb-btn.ghost:hover{border-color:var(--border2);color:var(--text)}

#tabbar{
  display:flex;gap:0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;
}
.tab{
  padding:10px 18px;
  font-family:'Press Start 2P',monospace;font-size:8px;
  color:var(--dim);cursor:pointer;
  border-bottom:2px solid transparent;
  white-space:nowrap;transition:all .15s;
}
.tab:hover{color:var(--muted)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

#content-area{overflow-y:auto;padding:24px}
.panel{display:none}
.panel.active{display:block}

.sh{display:flex;align-items:center;gap:12px;margin:0 0 16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sh h2{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--accent3);letter-spacing:.08em}
.sh-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(76,240,208,.2),transparent)}

.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:24px}
.sc{
  background:var(--surface2);
  border:1px solid var(--border);
  border-top:2px solid;
  padding:16px 14px;
}
.sc.amber{border-top-color:var(--accent)}
.sc.teal{border-top-color:var(--accent3)}
.sc.orange{border-top-color:var(--accent2)}
.sc.purple{border-top-color:var(--accent4)}
.sc.green{border-top-color:var(--success)}
.sc.red{border-top-color:var(--danger)}
.sc-lbl{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);margin-bottom:10px;display:block}
.sc-val{font-size:28px;font-weight:700;line-height:1;color:var(--text)}
.sc-sub{font-size:9px;color:var(--dim);margin-top:6px}

.card-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px}
.pcard{background:var(--surface2);border:1px solid var(--border);padding:18px;position:relative}
.pcard h3{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);margin-bottom:14px}

.tw{overflow-x:auto;border:1px solid var(--border);background:var(--surface2)}
table{width:100%;border-collapse:collapse}
thead th{
  background:var(--surface3);color:var(--dim);
  font-family:'Press Start 2P',monospace;font-size:7px;
  padding:10px 12px;text-align:left;
  border-bottom:1px solid var(--border);
}
tbody tr{border-bottom:1px solid var(--border)}
td{padding:9px 12px;font-size:11px}

.pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;font-family:'Press Start 2P',monospace;
  font-size:7px;
}
.pill::before{content:'';width:5px;height:5px;border-radius:50%}
.pill-available{background:rgba(240,180,76,.08);color:var(--accent);border:1px solid rgba(240,180,76,.2)}
.pill-available::before{background:var(--accent)}
.pill-issued{background:rgba(76,240,208,.08);color:var(--accent3);border:1px solid rgba(76,240,208,.2)}
.pill-issued::before{background:var(--accent3)}
.pill-redeemed{background:rgba(200,75,255,.08);color:var(--accent4);border:1px solid rgba(200,75,255,.2)}
.pill-redeemed::before{background:var(--accent4)}
.pill-expired{background:rgba(255,76,76,.08);color:var(--danger);border:1px solid rgba(255,76,76,.2)}
.pill-expired::before{background:var(--danger)}
.pill-hot{
  background:rgba(255,126,62,.12);color:var(--accent2);
  border:1px solid rgba(255,126,62,.3);
}

.fr{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fr input,.fr select{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-family:'Space Mono',monospace;font-size:11px;
  padding:6px 10px;
}

.btn{
  font-family:'Space Mono',monospace;font-size:11px;
  padding:6px 14px;border:1px solid;cursor:pointer;
  background:transparent;
}
.btn-amber{border-color:rgba(240,180,76,.4);color:var(--accent)}
.btn-amber:hover{background:rgba(240,180,76,.12)}
.btn-teal{border-color:rgba(76,240,208,.35);color:var(--accent3)}
.btn-teal:hover{background:rgba(76,240,208,.1)}
.btn-danger{border-color:rgba(255,76,76,.35);color:var(--danger)}
.btn-sm{padding:4px 10px;font-size:10px}

.code-box{
  background:var(--surface3);border:1px solid var(--border);
  padding:14px;font-family:'Space Mono',monospace;font-size:12px;
  max-height:200px;overflow-y:auto;
  color:var(--accent3);
  white-space:pre-wrap;
}

/* LOGIN GATE */
#login-gate{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;align-items:center;justify-content:center;
}
.lbox{
  width:min(360px,90vw);
  display:flex;flex-direction:column;align-items:center;gap:20px;
  padding:40px 36px;
  background:var(--surface);
  border:1px solid rgba(240,180,76,.15);
  position:relative;
}
.l-logo{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--accent);text-align:center}
.l-sub{font-size:8px;color:var(--dim);font-family:'Press Start 2P',monospace}
.l-input{
  width:100%;background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);font-family:'Press Start 2P',monospace;font-size:12px;
  padding:12px 16px;text-align:center;
}
.l-btn{
  width:100%;font-family:'Press Start 2P',monospace;font-size:9px;
  padding:13px;background:transparent;
  border:1px solid rgba(240,180,76,.4);color:var(--accent);
  cursor:pointer;
}
.l-btn:hover{background:var(--accent);color:#000}
.l-err{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--danger);text-align:center;min-height:18px}

.spanel{
  background:var(--surface2);border:1px solid var(--border);
  padding:18px;margin-bottom:16px;
}
.sform-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.sfield{display:flex;flex-direction:column;gap:5px;flex:1;min-width:140px}
.sfield label{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--dim)}
.sfield input,.sfield select{
  background:var(--surface3);border:1px solid var(--border);
  color:var(--text);font-family:'Space Mono',monospace;font-size:11px;
  padding:6px 10px;
}
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="login-gate">
  <div class="lbox">
    <div class="l-logo">RAOUF px</div>
    <div class="l-sub">ADMIN TERMINAL</div>
    <div class="l-input" style="background:transparent;border:none;padding:0;font-size:10px">enter admin key</div>
    <input class="l-input" type="password" id="login-key" placeholder="" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="l-btn" onclick="doLogin()">AUTHENTICATE</button>
    <div class="l-err" id="login-error"></div>
  </div>
</div>

<div id="shell" style="display:none">
  <div id="topbar">
    <div class="tb-logo">RAOUF px / ADMIN</div>
    <span class="tb-status" id="topbar-key-display"></span>
    <button class="tb-btn teal" onclick="loadAll()">REFRESH</button>
    <button class="tb-btn amber" onclick="exportCSV()">EXPORT CSV</button>
    <button class="tb-btn ghost" onclick="doLogout()">LOGOUT</button>
  </div>

  <div id="tabbar">
    <div class="tab active" data-tab="analytics">ANALYTICS</div>
    <div class="tab" data-tab="codes">CODES</div>
    <div class="tab" data-tab="generate">GENERATE</div>
  </div>

  <div id="content-area">
    <!-- ANALYTICS -->
    <div class="panel active" id="tab-analytics">
      <div class="sh"><h2>FUNNEL OVERVIEW</h2><div class="sh-line"></div></div>
      <div class="sg">
        <div class="sc amber"><span class="sc-lbl">Cards Issued</span><div class="sc-val" id="s-issued">-</div></div>
        <div class="sc teal"><span class="sc-lbl">QR Scans</span><div class="sc-val" id="s-scans">-</div></div>
        <div class="sc purple"><span class="sc-lbl">Unlocked</span><div class="sc-val" id="s-redeemed">-</div></div>
        <div class="sc green"><span class="sc-lbl">Bookings</span><div class="sc-val" id="s-bookings">-</div></div>
      </div>
    </div>

    <!-- CODES -->
    <div class="panel" id="tab-codes">
      <div class="fr">
        <input type="text" id="code-search" placeholder="Search code" oninput="renderCodes()" style="flex:1"/>
        <select id="code-filter" onchange="renderCodes()">
          <option value="">All statuses</option>
          <option value="available">Available</option>
          <option value="issued">Issued</option>
          <option value="redeemed">Redeemed</option>
        </select>
      </div>
      <div class="tw">
        <table>
          <thead>
            <th>Code</th><th>Status</th><th>Location</th><th>Notes</th><th>Created</th>
          </thead>
          <tbody id="codes-body"></tbody>
        </table>
      </div>
    </div>

    <!-- GENERATE -->
    <div class="panel" id="tab-generate">
      <div class="sh"><h2>GENERATE CODES</h2><div class="sh-line"></div></div>
      <div class="spanel" style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
        <div class="sfield" style="min-width:120px">
          <label>Quantity</label>
          <input id="gen-count" type="number" value="10" min="1" max="200"/>
        </div>
        <button class="btn btn-amber" onclick="generateBulk()">GENERATE BULK</button>
        <button class="btn btn-teal btn-sm" onclick="generateOne()">+ ONE CODE</button>
      </div>
      <div class="sh" style="margin-top:16px"><h2>OUTPUT</h2><div class="sh-line"></div></div>
      <div class="code-box" id="gen-output"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const API = 'https://raoufpx-promo-server-production.up.railway.app';
let allCodes = [];
let genCodes = [];
let _adminKey = '';

function key() { return _adminKey; }
function headers() { return { 'Content-Type':'application/json', 'Authorization':'Bearer '+key() }; }

// LOGIN
async function doLogin() {
  const input = document.getElementById('login-key').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!input) { errEl.textContent = 'Enter your admin key.'; return; }

  errEl.textContent = 'Connecting...';
  errEl.style.color = 'var(--muted)';

  try {
    // Test the key
    const r = await fetch(`${API}/admin/activity`, {
      headers: { 'Authorization': 'Bearer '+input }
    });

    if (!r.ok) {
      errEl.style.color = 'var(--danger)';
      errEl.textContent = r.status === 403 ? 'Invalid key.' : 'Server error';
      return;
    }
    
    _adminKey = input;
    document.getElementById('login-gate').style.display = 'none';
    document.getElementById('shell').style.display = 'grid';
    document.getElementById('topbar-key-display').textContent = 'authenticated';
    await loadAll();
  } catch(e) {
    errEl.style.color = 'var(--danger)';
    errEl.textContent = 'Cannot reach server.';
  }
}

function doLogout() {
  _adminKey = '';
  document.getElementById('login-key').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('login-gate').style.display = 'flex';
  document.getElementById('shell').style.display = 'none';
}

function fmtShort(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
}

// TABS
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-'+t.dataset.tab).classList.add('active');
  });
});

async function loadAll() {
  await Promise.all([loadAnalytics(), loadCodes()]);
}

async function loadAnalytics() {
  try {
    const r = await fetch(`${API}/admin/analytics`, { headers: headers() });
    if (!r.ok) throw new Error('Analytics failed');
    const d = await r.json();
    const f = d.funnel || {};
    
    document.getElementById('s-issued').textContent = f.codesIssued || '0';
    document.getElementById('s-scans').textContent = f.qrScans || '0';
    document.getElementById('s-redeemed').textContent = f.codesEntered || '0';
    document.getElementById('s-bookings').textContent = f.bookingsSubmitted || '0';
  } catch(e) {
    console.error('Analytics error:', e);
  }
}

async function loadCodes() {
  try {
    const r = await fetch(`${API}/admin/codes`, { headers: headers() });
    if (!r.ok) throw new Error('Codes failed');
    const d = await r.json();
    allCodes = d.codes || [];
    renderCodes();
  } catch(e) {
    console.error('Codes error:', e);
  }
}

function renderCodes() {
  const search = (document.getElementById('code-search').value || '').toLowerCase();
  const filter = document.getElementById('code-filter').value;
  
  let list = allCodes.filter(c => {
    if (filter && c.status !== filter) return false;
    if (search && !c.code.toLowerCase().includes(search)) return false;
    return true;
  });
  
  document.getElementById('codes-body').innerHTML = list.slice(0, 100).map(c => `
    <tr>
      <td style="color:var(--accent)">${c.code}</td>
      <td><span class="pill pill-${c.status}">${c.status}</span></td>
      <td>${c.location || '-'}</td>
      <td>${c.notes || '-'}</td>
      <td>${fmtShort(c.createdAt)}</td>
    </tr>
  `).join('') || '<tr><td colspan="5">No codes found</td></tr>';
}

async function generateBulk() {
  const count = parseInt(document.getElementById('gen-count').value) || 10;
  const r = await fetch(`${API}/admin/generate-bulk`, { 
    method: 'POST', 
    headers: headers(), 
    body: JSON.stringify({ count }) 
  });
  const d = await r.json();
  if (d.codes) {
    genCodes = [...genCodes, ...d.codes];
    document.getElementById('gen-output').textContent = genCodes.map(c => c.code).join('\n');
    await loadCodes();
  }
}

async function generateOne() {
  const r = await fetch(`${API}/admin/generate-code`, { method: 'POST', headers: headers() });
  const d = await r.json();
  if (d.code) {
    genCodes.push({ code: d.code, createdAt: d.createdAt });
    document.getElementById('gen-output').textContent = genCodes.map(c => c.code).join('\n');
    await loadCodes();
  }
}

function exportCSV() {
  window.open(`${API}/admin/export?key=${encodeURIComponent(key())}`, '_blank');
}
</script>
</body>
</html>
