<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAOUF px Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: monospace;
            background: #0a0a0a;
            color: #fff;
        }
        #login-gate {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .lbox {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 8px;
            width: 320px;
            text-align: center;
            border: 1px solid #f0b44c;
        }
        .l-logo {
            font-size: 24px;
            font-weight: bold;
            color: #f0b44c;
            margin-bottom: 20px;
        }
        .l-sub {
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
        }
        .l-divider {
            height: 1px;
            background: #333;
            margin: 20px 0;
        }
        .l-input {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .l-btn {
            width: 100%;
            padding: 12px;
            background: #f0b44c;
            color: #000;
            border: none;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .l-btn:hover {
            background: #ffcc66;
        }
        .l-err {
            color: #ff4444;
            font-size: 12px;
            margin-top: 10px;
            min-height: 30px;
        }
        #shell {
            display: none;
        }
        .tb-logo {
            padding: 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }
        .tb-btn {
            float: right;
            margin: 15px;
            padding: 8px 16px;
            background: #f0b44c;
            border: none;
            cursor: pointer;
        }
        .panel {
            padding: 20px;
        }
        .sh {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .sg {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .sc {
            background: #1a1a1a;
            padding: 20px;
            border-left: 3px solid #f0b44c;
        }
        .sc-lbl {
            font-size: 12px;
            color: #888;
            display: block;
            margin-bottom: 10px;
        }
        .sc-val {
            font-size: 28px;
            font-weight: bold;
        }
        .tw {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background: #1a1a1a;
            color: #f0b44c;
        }
        .tab {
            display: inline-block;
            padding: 10px 20px;
            cursor: pointer;
            background: #1a1a1a;
            margin-right: 5px;
        }
        .tab.active {
            background: #f0b44c;
            color: #000;
        }
        #tabbar {
            background: #0f0f0f;
            padding: 10px;
        }
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }
    </style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="login-gate">
    <div class="lbox">
        <div class="l-logo">RAOUF px</div>
        <div class="l-sub">ADMIN TERMINAL</div>
        <div class="l-divider"></div>
        <input class="l-input" type="password" id="login-key" placeholder="Enter admin key" autocomplete="current-password"/>
        <button class="l-btn" id="login-btn">AUTHENTICATE</button>
        <div class="l-err" id="login-error"></div>
    </div>
</div>

<div id="shell">
    <div id="topbar">
        <div class="tb-logo">RAOUF px / ADMIN</div>
        <button class="tb-btn" onclick="logout()">LOGOUT</button>
    </div>
    
    <div id="tabbar">
        <div class="tab active" onclick="switchTab('analytics')">ANALYTICS</div>
        <div class="tab" onclick="switchTab('codes')">CODES</div>
    </div>
    
    <div id="content-area">
        <div class="panel active" id="tab-analytics">
            <div class="sh"><h2>FUNNEL OVERVIEW</h2></div>
            <div class="sg" id="stats-container">
                <div class="sc"><span class="sc-lbl">Loading...</span><div class="sc-val">-</div></div>
            </div>
        </div>
        
        <div class="panel" id="tab-codes">
            <div class="sh"><h2>CODES</h2></div>
            <div class="tw">
                <table id="codes-table">
                    <thead>
                        <tr><th>Code</th><th>Status</th><th>Location</th><th>Notes</th></tr>
                    </thead>
                    <tbody id="codes-body">
                        <tr><td colspan="4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
const API = 'https://raoufpx-promo-server-production.up.railway.app';
let adminKey = '';

// Login function
async function doLogin(password) {
    const errEl = document.getElementById('login-error');
    
    try {
        // Test the key
        const r = await fetch(`${API}/admin/activity`, {
            headers: { 'Authorization': 'Bearer ' + password }
        });
        
        if (!r.ok) {
            throw new Error('Invalid key');
        }
        
        // Success!
        adminKey = password;
        document.getElementById('login-gate').style.display = 'none';
        document.getElementById('shell').style.display = 'block';
        
        // Load data
        await loadAnalytics();
        await loadCodes();
        
    } catch(err) {
        errEl.textContent = 'Invalid admin key. Try: raoufpx-admin-2024';
        console.error(err);
    }
}

// Load analytics
async function loadAnalytics() {
    try {
        const r = await fetch(`${API}/admin/analytics`, {
            headers: { 'Authorization': 'Bearer ' + adminKey }
        });
        const data = await r.json();
        
        const stats = [
            { label: 'Total Codes', value: data.funnel?.codesGenerated || 0 },
            { label: 'Issued', value: data.funnel?.codesIssued || 0 },
            { label: 'Scans', value: data.funnel?.qrScans || 0 },
            { label: 'Redeemed', value: data.funnel?.codesEntered || 0 },
            { label: 'Bookings', value: data.funnel?.bookingsSubmitted || 0 }
        ];
        
        document.getElementById('stats-container').innerHTML = stats.map(s => `
            <div class="sc">
                <span class="sc-lbl">${s.label}</span>
                <div class="sc-val">${s.value}</div>
            </div>
        `).join('');
        
    } catch(err) {
        console.error('Failed to load analytics:', err);
    }
}

// Load codes
async function loadCodes() {
    try {
        const r = await fetch(`${API}/admin/codes`, {
            headers: { 'Authorization': 'Bearer ' + adminKey }
        });
        const data = await r.json();
        
        const codes = data.codes || [];
        document.getElementById('codes-body').innerHTML = codes.slice(0, 50).map(c => `
            <tr>
                <td style="color: #f0b44c">${c.code}</td>
                <td><span style="color: ${c.status === 'redeemed' ? '#4caf50' : c.status === 'issued' ? '#ff9800' : '#888'}">${c.status}</span></td>
                <td>${c.location || '-'}</td>
                <td>${c.notes || '-'}</td>
            </tr>
        `).join('');
        
    } catch(err) {
        console.error('Failed to load codes:', err);
    }
}

// Switch tabs
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    
    event.target.classList.add('active');
    document.getElementById(`tab-${tab}`).classList.add('active');
}

// Logout
function logout() {
    adminKey = '';
    document.getElementById('login-gate').style.display = 'flex';
    document.getElementById('shell').style.display = 'none';
    document.getElementById('login-key').value = '';
}

// Setup login button
document.addEventListener('DOMContentLoaded', function() {
    const loginBtn = document.getElementById('login-btn');
    const loginInput = document.getElementById('login-key');
    
    loginBtn.onclick = function() {
        const password = loginInput.value.trim();
        if (password) {
            doLogin(password);
        } else {
            document.getElementById('login-error').textContent = 'Please enter admin key';
        }
    };
    
    loginInput.onkeypress = function(e) {
        if (e.key === 'Enter') {
            loginBtn.click();
        }
    };
});
</script>

</body>
</html>
